# GitHub Pages — continuous delivery for the static site.
#
# One-time repo setup (Settings):
#   • Pages → Build and deployment → Source: "GitHub Actions"
#   • Actions → General → Workflow permissions: "Read and write"  (for release.yml)
#   • Pages → Custom domain: vitmargan.be  (once DNS is live) + "Enforce HTTPS"
#
# DNS for the apex vitmargan.be → GitHub Pages (at your .be registrar):
#   A      @     185.199.108.153
#   A      @     185.199.109.153
#   A      @     185.199.110.153
#   A      @     185.199.111.153
#   CNAME  www   vmargan.github.io.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deployments at once
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip the release bot's own version-bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000 # 10 min (deploy-pages action maximum)
